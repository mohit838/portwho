name: Build Debian Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packaging dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            dpkg-dev \
            debhelper \
            devscripts \
            fakeroot \
            lintian

      - name: Run tests
        run: |
          set -euxo pipefail
          bash tests/test_portwho.sh

      - name: Build binary package
        run: |
          set -euxo pipefail
          dpkg-buildpackage -us -uc -b

      - name: Lint Debian package
        run: |
          set -euxo pipefail
          lintian --display-info --fail-on warning ../portwho_*.deb

      - name: Smoke test package install
        run: |
          set -euxo pipefail
          sudo dpkg -i ../portwho_*.deb || sudo apt-get -f install -y
          command -v portwho
          portwho --help >/dev/null

      - name: Collect package artifacts
        run: |
          set -euxo pipefail
          mkdir -p dist
          cp -v ../portwho_*.deb dist/
          cp -v ../portwho_*.changes dist/
          cp -v ../portwho_*.buildinfo dist/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: portwho-deb-${{ github.ref_name }}
          path: dist/*

      - name: Attach package to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.changes
            dist/*.buildinfo
          generate_release_notes: true
