name: Publish To Launchpad PPA

on:
  workflow_dispatch:
    inputs:
      ppa_owner:
        description: "Launchpad owner (user or team)"
        required: true
        default: "mohit838"
      ppa_name:
        description: "Launchpad PPA name"
        required: true
        default: "portwho"
      ubuntu_series:
        description: "Ubuntu series"
        required: true
        type: choice
        options: [jammy, noble, oracular, plucky]

permissions:
  contents: read

jobs:
  ppa-upload:
    runs-on: ubuntu-latest
    env:
      DEBFULLNAME: Mohitul Islam
      DEBEMAIL: connect@mohitul-islam.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential dpkg-dev debhelper devscripts dput gnupg

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.LAUNCHPAD_GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.LAUNCHPAD_GPG_PASSPHRASE }}
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import || echo "$GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import
          
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" > ~/.gnupg/gpg.conf
          gpgconf --kill gpg-agent
          gpgconf --launch gpg-agent

          # The Wrapper
          printf '%s\n' \
            '#!/usr/bin/env bash' \
            'exec gpg --batch --no-tty --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" "$@"' \
            > ~/.gnupg/gpg-wrapper.sh
          chmod +x ~/.gnupg/gpg-wrapper.sh

      - name: Resolve Fingerprint
        id: gpg
        run: |
          FPR=$(gpg --batch --with-colons --list-secret-keys | awk -F: '/^fpr:/ {print $10; exit}')
          echo "key_fpr=$FPR" >> "$GITHUB_OUTPUT"

      - name: Update Changelog
        run: |
          SERIES='${{ inputs.ubuntu_series }}'
          VERSION="$(dpkg-parsechangelog -SVersion)+ppa${GITHUB_RUN_NUMBER}~${SERIES}1"
          dch --newversion "$VERSION" --distribution "$SERIES" "PPA build for $SERIES"

      - name: Build and Sign
        env:
          KEY_FPR: ${{ steps.gpg.outputs.key_fpr }}
          GPG_PASSPHRASE: ${{ secrets.LAUNCHPAD_GPG_PASSPHRASE }}
        run: |
          export GPG_PASSPHRASE
          # Build unsigned
          dpkg-buildpackage -S -sa -d -us -uc
          # Sign specifically with debsign
          debsign -p"$HOME/.gnupg/gpg-wrapper.sh" -k"$KEY_FPR" ../portwho_*_source.changes

      - name: Upload to Launchpad
        env:
          OWNER: ${{ inputs.ppa_owner }}
          PPA: ${{ inputs.ppa_name }}
        run: |
          CHANGES_FILE="$(ls -1 ../portwho_*_source.changes | head -n 1)"
          dput "ppa:${OWNER}/${PPA}" "$CHANGES_FILE"
