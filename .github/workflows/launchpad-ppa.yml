name: Publish To Launchpad PPA

on:
  workflow_dispatch:
    inputs:
      ppa_owner:
        description: "Launchpad owner (user or team), e.g. mohit838"
        required: true
        default: "mohit838"
      ppa_name:
        description: "Launchpad PPA name, e.g. portwho"
        required: true
        default: "portwho"
      ubuntu_series:
        description: "Ubuntu series for changelog distribution"
        required: true
        type: choice
        options:
          - jammy
          - noble
          - oracular
          - plucky

permissions:
  contents: read

jobs:
  ppa-upload:
    runs-on: ubuntu-latest
    env:
      DEBFULLNAME: Mohitul Islam
      DEBEMAIL: connect@mohitul-islam.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install upload dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            dpkg-dev \
            debhelper \
            devscripts \
            equivs \
            dput \
            fakeroot \
            gnupg \
            ca-certificates

      - name: Patch debian/control Build-Depends (PPA-friendly)
        run: |
          set -euxo pipefail
          if grep -qE 'build-essential:native' debian/control; then
            sed -i 's/build-essential:native/build-essential/g' debian/control
          fi

      - name: Install Build-Depends from debian/control
        run: |
          set -euxo pipefail
          sudo mk-build-deps --install --remove \
            --tool "apt-get -o Debug::pkgProblemResolver=yes --no-install-recommends -y" \
            debian/control

      - name: Run tests
        run: |
          set -euxo pipefail
          bash tests/test_portwho.sh

      - name: Import GPG key + configure non-interactive signing
        env:
          GPG_PRIVATE_KEY: ${{ secrets.LAUNCHPAD_GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.LAUNCHPAD_GPG_PASSPHRASE }}
        run: |
          set -euxo pipefail

          if [[ -z "${GPG_PRIVATE_KEY:-}" ]]; then
            echo "Missing secret: LAUNCHPAD_GPG_PRIVATE_KEY" >&2
            exit 1
          fi

          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg

          # Import (armored or base64)
          if ! echo "$GPG_PRIVATE_KEY" | gpg --batch --import; then
            echo "$GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import
          fi

          # Force loopback pinentry (no /dev/tty usage)
          cat > ~/.gnupg/gpg.conf <<'EOF'
use-agent
pinentry-mode loopback
EOF

          cat > ~/.gnupg/gpg-agent.conf <<'EOF'
allow-loopback-pinentry
EOF

          gpgconf --kill gpg-agent || true
          gpgconf --launch gpg-agent

          # Make sure passphrase exists (signing will fail otherwise for protected keys)
          if [[ -z "${GPG_PASSPHRASE:-}" ]]; then
            echo "Missing secret: LAUNCHPAD_GPG_PASSPHRASE" >&2
            exit 1
          fi

          # Create a wrapper that dpkg-buildpackage will call for signing
          cat > ~/.gnupg/gpg-wrapper.sh <<'EOF'
#!/usr/bin/env bash
set -euo pipefail

# dpkg passes args like: --local-user <key> --armor --detach-sign ...
# We force loopback + passphrase so gpg never tries /dev/tty.
exec gpg --batch --yes \
  --pinentry-mode loopback \
  --passphrase "$GPG_PASSPHRASE" \
  "$@"
EOF
          chmod 700 ~/.gnupg/gpg-wrapper.sh

      - name: Resolve signing key fingerprint
        id: gpg
        env:
          LONG_KEY_ID: ${{ secrets.DEB_SIGN_KEYID }}   # you can keep your 16-hex here
          LONG_KEY_ID_FALLBACK: ${{ secrets.DEBSIGN_KEYID }}
        run: |
          set -euxo pipefail

          KEY="${LONG_KEY_ID:-}"
          if [[ -z "$KEY" ]]; then
            KEY="${LONG_KEY_ID_FALLBACK:-}"
          fi
          if [[ -n "$KEY" ]]; then
            KEY="$(echo "$KEY" | tr -d '[:space:]' | tr '[:lower:]' '[:upper:]')"
          fi

          if [[ -n "$KEY" ]]; then
            FPR="$(gpg --batch --with-colons --fingerprint "$KEY" 2>/dev/null | awk -F: '/^fpr:/ {print $10; exit}')"
          else
            FPR=""
          fi

          if [[ -z "${FPR:-}" ]]; then
            FPR="$(gpg --batch --with-colons --list-secret-keys | awk -F: '/^fpr:/ {print $10; exit}')"
          fi

          if [[ -z "${FPR:-}" ]]; then
            echo "Unable to discover secret key fingerprint after import." >&2
            gpg --list-secret-keys --keyid-format=long || true
            exit 1
          fi

          if ! echo "$FPR" | grep -Eq '^[0-9A-F]{40}$'; then
            echo "Resolved fingerprint looks wrong: $FPR" >&2
            exit 1
          fi

          echo "key_fpr=$FPR" >> "$GITHUB_OUTPUT"

      - name: Prepare changelog for selected Ubuntu series
        run: |
          set -euxo pipefail
          SERIES='${{ inputs.ubuntu_series }}'
          CURRENT_VERSION="$(dpkg-parsechangelog -SVersion)"
          BASE_VERSION="${CURRENT_VERSION%%~*}"
          BASE_VERSION="${BASE_VERSION%%+ppa*}"

          TARGET_VERSION="${BASE_VERSION}+ppa${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}~${SERIES}1"
          if dpkg --compare-versions "$TARGET_VERSION" le "$CURRENT_VERSION"; then
            TARGET_VERSION="${BASE_VERSION}+ppa${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}.1~${SERIES}1"
          fi

          dch --newversion "$TARGET_VERSION" --distribution "$SERIES" "Launchpad build for $SERIES."

      - name: Build source package (non-interactive signed)
        env:
          KEY_FPR: ${{ steps.gpg.outputs.key_fpr }}
          DEB_SIGN_KEYID: ${{ steps.gpg.outputs.key_fpr }}
          DEBSIGN_KEYID: ${{ steps.gpg.outputs.key_fpr }}
          GPG_PASSPHRASE: ${{ secrets.LAUNCHPAD_GPG_PASSPHRASE }}
        run: |
          set -euxo pipefail
          # Use wrapper so gpg never tries /dev/tty
          dpkg-buildpackage -S -sa -d -k"$KEY_FPR" \
            --sign-command="$HOME/.gnupg/gpg-wrapper.sh"

      - name: Upload source artifacts from CI run
        run: |
          set -euxo pipefail
          mkdir -p dist
          cp -v ../portwho_*.dsc dist/
          cp -v ../portwho_*.changes dist/
          cp -v ../portwho_*.tar.* dist/ || true
          cp -v ../portwho_*.buildinfo dist/ || true

      - name: Attach source package artifact
        uses: actions/upload-artifact@v4
        with:
          name: portwho-ppa-source-${{ inputs.ubuntu_series }}
          path: dist/*

      - name: Upload to Launchpad PPA
        env:
          OWNER: ${{ inputs.ppa_owner }}
          PPA: ${{ inputs.ppa_name }}
        run: |
          set -euxo pipefail
          CHANGES_FILE="$(ls -1 ../portwho_*_source.changes | head -n 1)"
          dput "ppa:${OWNER}/${PPA}" "$CHANGES_FILE"