name: Publish To Launchpad PPA

on:
  workflow_dispatch:
    inputs:
      ppa_owner:
        description: 'Launchpad owner (user or team), e.g. mohit838'
        required: true
        default: 'mohit838'
      ppa_name:
        description: 'Launchpad PPA name, e.g. portwho'
        required: true
        default: 'portwho'
      ubuntu_series:
        description: 'Ubuntu series for changelog distribution'
        required: true
        type: choice
        options:
          - jammy
          - noble
          - oracular
          - plucky

permissions:
  contents: read

jobs:
  ppa-upload:
    runs-on: ubuntu-latest
    env:
      DEBFULLNAME: Mohitul Islam
      DEBEMAIL: connect@mohitul-islam.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install upload dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dpkg-dev \
            debhelper \
            devscripts \
            dput \
            fakeroot \
            gnupg

      - name: Run tests
        run: bash tests/test_portwho.sh

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.LAUNCHPAD_GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.LAUNCHPAD_GPG_PASSPHRASE }}
        run: |
          if [[ -z "${GPG_PRIVATE_KEY:-}" ]]; then
            echo "Missing secret: LAUNCHPAD_GPG_PRIVATE_KEY" >&2
            exit 1
          fi

          if ! echo "$GPG_PRIVATE_KEY" | gpg --batch --import; then
            echo "$GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import
          fi

          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          printf '%s\n' \
            'use-agent' \
            'pinentry-mode loopback' \
            > ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf

          if [[ -n "${GPG_PASSPHRASE:-}" ]]; then
            echo "$GPG_PASSPHRASE" | gpg --batch --pinentry-mode loopback --passphrase-fd 0 --list-secret-keys >/dev/null
          fi

      - name: Derive signing key id
        id: gpg
        run: |
          KEY_ID="$(gpg --list-secret-keys --keyid-format=long | awk '/^sec/{print $2}' | awk -F/ 'NR==1{print $2}')"
          if [[ -z "$KEY_ID" ]]; then
            echo "Unable to discover secret key id" >&2
            exit 1
          fi
          echo "key_id=$KEY_ID" >> "$GITHUB_OUTPUT"

      - name: Prepare changelog for selected Ubuntu series
        run: |
          SERIES='${{ inputs.ubuntu_series }}'
          CURRENT_VERSION="$(dpkg-parsechangelog -SVersion)"
          BASE_VERSION="${CURRENT_VERSION%%~*}"
          TARGET_VERSION="${BASE_VERSION}~${SERIES}1"
          dch --newversion "$TARGET_VERSION" --distribution "$SERIES" "Launchpad build for $SERIES."

      - name: Build source package
        env:
          KEY_ID: ${{ steps.gpg.outputs.key_id }}
        run: |
          dpkg-buildpackage -S -sa -k"$KEY_ID"

      - name: Upload source artifacts from CI run
        run: |
          mkdir -p dist
          cp -v ../portwho_*.dsc dist/
          cp -v ../portwho_*.changes dist/
          cp -v ../portwho_*.tar.* dist/
          cp -v ../portwho_*.buildinfo dist/

      - name: Attach source package artifact
        uses: actions/upload-artifact@v4
        with:
          name: portwho-ppa-source-${{ inputs.ubuntu_series }}
          path: dist/*

      - name: Upload to Launchpad PPA
        env:
          OWNER: ${{ inputs.ppa_owner }}
          PPA: ${{ inputs.ppa_name }}
        run: |
          CHANGES_FILE="$(ls -1 ../portwho_*_source.changes | head -n 1)"
          dput "ppa:${OWNER}/${PPA}" "$CHANGES_FILE"
